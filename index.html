        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            signOut, 
            sendPasswordResetEmail,
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTEwQr-6z4y8JhkDPsjd6k0M-7J8cdnCg",
            authDomain: "financerebaz.firebaseapp.com",
            databaseURL: "https://financerebaz-default-rtdb.firebaseio.com",
            projectId: "financerebaz",

            messagingSenderId: "476412084259",
            appId: "1:476412084259:web:3c427cd171f4eba5e0b196",
            measurementId: "G-7RL46G40CZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        window.db = db;
        window.auth = auth;
        window.firebaseRef = ref;
        window.firebaseSet = set;
        window.firebaseGet = get;
        window.firebaseUpdate = update;
        window.firebasePush = push;
        window.firebaseChild = child;
        window.firebaseOnValue = onValue;
        window.onAuthStateChanged = onAuthStateChanged;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signOut = signOut;
        window.sendPasswordResetEmail = sendPasswordResetEmail;

        window.dispatchEvent(new Event('firebase-ready'));
    </script>
    <style>

        .tab-btn.active { border-bottom-color: #1f5f8e; font-weight: 600; }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); display:flex; align-items:center; justify-content:center; z-index:9999; }
        .request-list { margin-top: 12px; }
        .request-item { display: flex; align-items: center; justify-content: space-between; background: #f1f5f9; padding: 8px 16px; border-radius: 30px; margin-bottom: 6px; }
        .approve-btn { background: #1f7840; color: white; border: none; border-radius: 20px; padding: 4px 12px; font-size: 0.7rem; cursor: pointer; margin-right: 8px; }
        .reject-btn { background: #bc3f2e; color: white; border: none; border-radius: 20px; padding: 4px 12px; font-size: 0.7rem; cursor: pointer; }
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .user-bar, .admin-panel, .info-bar, .modal, .btn-sm, .print-btn, #logoutBtn, .table-actions, .delete-btn, .action-cell, .remove-col-btn, .section-header .table-actions, .section-header .btn, #activityLogContainer, .clear-log-btn, #reportContent, #reportDateSelect, #generateReportBtn, #saveSnapshotBtn, .permission-table, #permTable, .colleague-list, .remove-colleague, .reset-pwd-btn { display: none !important; }

            .editable-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
            .editable-table th, .editable-table td { border: 1px solid #999 !important; padding: 6px 4px; }

            .cell-input { -webkit-appearance: none; appearance: none; color: black; }

<body>
<div id="appRoot">Loading Firebase...</div>
<script>
    (function() {
        let db, auth, ref, set, get, update, push, child, onValue, onAuthStateChanged,
            signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, sendPasswordResetEmail;
        let firebaseReady = false;

        window.addEventListener('firebase-ready', () => {
            db = window.db;
            auth = window.auth;
            ref = window.firebaseRef;
            set = window.firebaseSet;
            get = window.firebaseGet;
            update = window.firebaseUpdate;
            push = window.firebasePush;
            child = window.firebaseChild;
            onValue = window.firebaseOnValue;
            onAuthStateChanged = window.onAuthStateChanged;
            signInWithEmailAndPassword = window.signInWithEmailAndPassword;
            createUserWithEmailAndPassword = window.createUserWithEmailAndPassword;
            signOut = window.signOut;
            sendPasswordResetEmail = window.sendPasswordResetEmail;
            firebaseReady = true;
            bootstrap();
        });

        // -------------------- GLOBAL VARIABLES --------------------
        let invoiceColumns = [], accountsColumns = [], fibColumns = [];
        const DEFAULT_INVOICE_COLUMNS = [
            { key: "area", label: "Area" }, { key: "invoiceNo", label: "Invoice No" }, { key: "submissionDate", label: "Submission Date" },
            { key: "daysOutstand", label: "Days Outstand" }, { key: "company", label: "Company" }, { key: "amount", label: "Amount (USD)" },
            { key: "exchangeRate", label: "Exchange Rate" }, { key: "bankStatus", label: "Bank Status" }, { key: "topUpStatus", label: "Account Top-Up Status" }
        ];
        const DEFAULT_ACCOUNTS_COLUMNS = [
            { key: "account", label: "Accounts" }, { key: "invoiceNo", label: "Invoice No" },
            { key: "balance", label: "Balance we have" }, { key: "yesterdaySales", label: "yesterday sales" }
        ];
        const DEFAULT_FIB_COLUMNS = [
            { key: "invoiceNo", label: "FIB Balance (Invoice No)" }, { key: "amount", label: "Amount" },
            { key: "remaining", label: "Remaining Amount" }, { key: "status", label: "Status" }
        ];

        let invoiceData = [], accountsData = [], fibData = [];
        let viewerPermissions = {};
        let activityLog = [];
        const MAX_LOG_ENTRIES = 200;
        let snapshots = {};
        let currentUser = null;
        let userRole = null;
        const ADMIN_EMAIL = "Rebaz.abdullah@Fast-pay.iq";

        // Helper: get current date in Baghdad time (YYYY-MM-DD)
        function getBaghdadDate() {
            const date = new Date();
            const formatter = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Baghdad', year: 'numeric', month: '2-digit', day: '2-digit' });
            return formatter.format(date);
        }

        // Helper: format timestamp for display in Baghdad time
        function formatBaghdadDateTime(isoString) {
            return new Date(isoString).toLocaleString('en-IQ', { timeZone: 'Asia/Baghdad' });
        }
        function formatBaghdadDate(isoString) {
            return new Date(isoString).toLocaleDateString('en-IQ', { timeZone: 'Asia/Baghdad' });
        }

        function simpleHash(str) { let h = 0; for (let i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; } return h.toString(16); }

        const PATHS = {
            USER_ROLES: 'userRoles',
            COLUMNS: 'columns',
            DATA: 'data',
            PERMISSIONS: 'permissions',
            ACTIVITY_LOG: 'activityLog',
            SNAPSHOTS: 'snapshots',
            ACCESS_REQUESTS: 'accessRequests'
        };

        async function fbGet(path) {
            const snapshot = await get(ref(db, path));
            return snapshot.exists() ? snapshot.val() : null;
        }
        async function fbSet(path, data) {
            await set(ref(db, path), data);
        }
        async function fbUpdate(path, data) {
            await update(ref(db, path), data);
        }
        async function fbPush(path, data) {
            const newRef = push(ref(db, path));
            await set(newRef, data);
            return newRef.key;
        }

        async function loadColumnsAndData() {
            try {
                const colsData = await fbGet(PATHS.COLUMNS);
                invoiceColumns = (colsData?.invoice) ? colsData.invoice : [...DEFAULT_INVOICE_COLUMNS];
                accountsColumns = (colsData?.accounts) ? colsData.accounts : [...DEFAULT_ACCOUNTS_COLUMNS];
                fibColumns = (colsData?.fib) ? colsData.fib : [...DEFAULT_FIB_COLUMNS];

                const data = await fbGet(PATHS.DATA);
                invoiceData = (data?.invoice) ? data.invoice : [];
                accountsData = (data?.accounts) ? data.accounts : [];
                fibData = (data?.fib) ? data.fib : [];

                if (invoiceData.length === 0) {
                    const defaultRows = [
                        { area: "Erbil To Baghdad", invoiceNo: "12888407", submissionDate: "29-Mar-26", daysOutstand: "8", company: "Mintroute", amount: "IQD 1,450,000,000", exchangeRate: "", bankStatus: "N/A", topUpStatus: "Not Received" },
                        { area: "Baghdad To Mintroute", invoiceNo: "2166", submissionDate: "23-Mar-26", daysOutstand: "14", company: "Mintroute", amount: "$ 1,052,705.00", exchangeRate: "IQD 1,320", bankStatus: "Final Approval", topUpStatus: "Not Received" }
                    ];
                    invoiceData = defaultRows.map(row => { let newRow = {}; invoiceColumns.forEach(c => newRow[c.key] = row[c.key] || ""); return newRow; });
                }
                if (accountsData.length === 0) {
                    const defaultRows = [
                        { account: "LikeCard", invoiceNo: "INV-1001", balance: "$ 32,040.43", yesterdaySales: "$ 483.26" },
                        { account: "Mintroute", invoiceNo: "INV-1002", balance: "$ 832,474.70", yesterdaySales: "$ 65,772.75" },
                        { account: "OneCard", invoiceNo: "INV-1003", balance: "$ 100,000.00", yesterdaySales: "$ -" },
                        { account: "FIB:Mintroute", invoiceNo: "INV-1004", balance: "$ 814,388.37", yesterdaySales: "$ 55,033.17" }
                    ];
                    accountsData = defaultRows.map(row => { let newRow = {}; accountsColumns.forEach(c => newRow[c.key] = row[c.key] || ""); return newRow; });
                }
                if (fibData.length === 0) {
                    const defaultRows = [
                        { invoiceNo: "T14", amount: "$1,000,000.00", remaining: "$500,000.00", status: "Remaining" },
                        { invoiceNo: "T15", amount: "$1,000,000.00", remaining: "$1,000,000.00", status: "Pending To Pay" }
                    ];
                    fibData = defaultRows.map(row => { let newRow = {}; fibColumns.forEach(c => newRow[c.key] = row[c.key] || ""); return newRow; });
                }
                await saveAllToStorage();
            } catch (e) {
                console.error("Load error:", e);
                invoiceColumns = [...DEFAULT_INVOICE_COLUMNS];
                accountsColumns = [...DEFAULT_ACCOUNTS_COLUMNS];
                fibColumns = [...DEFAULT_FIB_COLUMNS];
            }
        }

        async function saveColumnsToStorage() {
            await fbUpdate(PATHS.COLUMNS, {
                invoice: invoiceColumns,
                accounts: accountsColumns,
                fib: fibColumns
            });
        }
        async function saveDataToStorage() {
            await fbUpdate(PATHS.DATA, {
                invoice: invoiceData,
                accounts: accountsData,
                fib: fibData
            });
        }
        async function saveAllToStorage() {
            await saveColumnsToStorage();
            await saveDataToStorage();
        }

        async function getUserRole(uid) {
            const snapshot = await get(ref(db, `${PATHS.USER_ROLES}/${uid}`));
            return snapshot.exists() ? snapshot.val().role : null;
        }

        async function setUserRole(uid, role) {
            await set(ref(db, `${PATHS.USER_ROLES}/${uid}`), { role, email: currentUser?.email || '' });
        }

        function getDefaultTablePerms() { 
            return { 
                view: true, 
                edit: false,
                addRow: false, 
                deleteRow: false, 
                addColumn: false, 
                deleteColumn: false 
            }; 
        }
        function getDefaultViewerPermissions() {
            return {
                invoice: getDefaultTablePerms(),
                accounts: getDefaultTablePerms(),
                fib: getDefaultTablePerms()
            };
        }

        async function loadPermissions() {
            const perms = await fbGet(PATHS.PERMISSIONS);
            viewerPermissions = perms || {};
        }

        async function savePermissions() {
            await fbSet(PATHS.PERMISSIONS, viewerPermissions);
        }

        function ensureViewerPermissions(uid) {
            if (!viewerPermissions[uid]) {
                viewerPermissions[uid] = getDefaultViewerPermissions();
                savePermissions();
            } else {
                const perms = viewerPermissions[uid];
                if (!perms.invoice) perms.invoice = getDefaultTablePerms();
                if (!perms.accounts) perms.accounts = getDefaultTablePerms();
                if (!perms.fib) perms.fib = getDefaultTablePerms();
            }
        }

        async function updateTablePermission(uid, table, action, value) {
            if (!viewerPermissions[uid]) viewerPermissions[uid] = getDefaultViewerPermissions();
            if (!viewerPermissions[uid][table]) viewerPermissions[uid][table] = getDefaultTablePerms();
            viewerPermissions[uid][table][action] = value;
            await savePermissions();
            await logActivity(currentUser?.email || 'system', "Changed permission", `${uid} - ${table}.${action}=${value}`);
            renderFullApp();
        }

        async function loadActivityLog() {
            const log = await fbGet(PATHS.ACTIVITY_LOG);
            activityLog = log ? (Array.isArray(log) ? log : Object.values(log)) : [];
        }
        async function saveActivityLog() {
            if (activityLog.length > MAX_LOG_ENTRIES) activityLog = activityLog.slice(-MAX_LOG_ENTRIES);
            await fbSet(PATHS.ACTIVITY_LOG, activityLog);
        }
        async function logActivity(userEmail, action, details = "") {
            activityLog.push({ timestamp: new Date().toISOString(), userEmail, action, details });
            await saveActivityLog();
            const container = document.getElementById("activityLogContainer");
            if (container) renderActivityLog();
        }
        function renderActivityLog() {
            const container = document.getElementById("activityLogContainer");
            if (!container) return;
            if (activityLog.length === 0) { container.innerHTML = '<div class="log-entry" style="justify-content:center;">No activity recorded.</div>'; return; }
            const reversed = [...activityLog].reverse();
            container.innerHTML = reversed.map(entry => `<div class="log-entry"><span class="log-time">${formatBaghdadDateTime(entry.timestamp)}</span><span class="log-user">${escapeHtml(entry.userEmail)}</span><span class="log-action"><strong>${escapeHtml(entry.action)}</strong> ${escapeHtml(entry.details)}</span></div>`).join('');
        }
        async function clearActivityLog() {
            if (confirm("Clear all logs?")) { activityLog = []; await saveActivityLog(); renderActivityLog(); await logActivity(currentUser?.email, "Cleared activity log", ""); }
        }

        async function loadSnapshots() {
            const snaps = await fbGet(PATHS.SNAPSHOTS);
            snapshots = snaps || {};
        }
        async function saveSnapshots() { await fbSet(PATHS.SNAPSHOTS, snapshots); }
        async function saveCurrentSnapshot(date = null) {
            const today = date || getBaghdadDate(); // Use Baghdad date
            snapshots[today] = {
                date: today, timestamp: new Date().toISOString(),
                invoiceColumns: JSON.parse(JSON.stringify(invoiceColumns)), accountsColumns: JSON.parse(JSON.stringify(accountsColumns)), fibColumns: JSON.parse(JSON.stringify(fibColumns)),
                invoiceData: JSON.parse(JSON.stringify(invoiceData)), accountsData: JSON.parse(JSON.stringify(accountsData)), fibData: JSON.parse(JSON.stringify(fibData))
            };
            await saveSnapshots();
            await logActivity(currentUser?.email, "Saved daily snapshot", `Date: ${today}`);
            alert(`Snapshot saved for ${today}`);
            if (document.getElementById("reportDateSelect")) populateReportDateSelect();
        }
        function populateReportDateSelect() {
            const select = document.getElementById("reportDateSelect");
            if (!select) return;
            const dates = Object.keys(snapshots).sort().reverse();
            select.innerHTML = '<option value="">-- Select a date --</option>';
            dates.forEach(d => { const opt = document.createElement("option"); opt.value = d; opt.textContent = d; select.appendChild(opt); });
        }
        function extractNumericAmount(str) { if (!str) return 0; const m = str.toString().match(/[\d,]+\.?\d*/); return m ? parseFloat(m[0].replace(/,/g, '')) : 0; }
        function generateReportForDate(date) {
            const s = snapshots[date];
            if (!s) { alert("No snapshot for this date."); return; }
            const reportDiv = document.getElementById("reportContent");
            if (!reportDiv) return;
            let invTotalUSD = 0, invTotalIQD = 0;
            s.invoiceData.forEach(row => { const amt = row.amount || ""; if (amt.includes("$")) invTotalUSD += extractNumericAmount(amt); else if (amt.includes("IQD")) invTotalIQD += extractNumericAmount(amt); });
            let accTotalBalance = 0;
            s.accountsData.forEach(row => { accTotalBalance += extractNumericAmount(row.balance); });
            let fibTotalAmount = 0, fibTotalRemaining = 0;
            s.fibData.forEach(row => { fibTotalAmount += extractNumericAmount(row.amount); fibTotalRemaining += extractNumericAmount(row.remaining); });
            const renderTable = (data, cols) => `<table class="editable-table" style="margin-top:12px;"><thead><tr>${cols.map(c => `<th>${escapeHtml(c.label)}</th>`).join('')}</td></thead><tbody>${data.map(row => `<tr>${cols.map(c => `<td>${escapeHtml(row[c.key] || '')}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
            reportDiv.innerHTML = `<div class="report-container"><h4>📊 Summary for ${date}</h4><table class="report-summary"><thead><tr><th>Section</th><th>Row Count</th><th>Totals</th></tr></thead><tbody>

        function downloadReportAsCSV() {
            const dateSelect = document.getElementById("reportDateSelect");
            const selectedDate = dateSelect ? dateSelect.value : null;
            let snapshot = null;
            if (selectedDate && snapshots[selectedDate]) { snapshot = snapshots[selectedDate]; }
            else { snapshot = { invoiceColumns, accountsColumns, fibColumns, invoiceData, accountsData, fibData, date: getBaghdadDate() }; }
            function arrayToCSV(data, cols) {
                if (!data.length) return "";
                const headers = cols.map(c => `"${c.label.replace(/"/g, '""')}"`).join(',');
                const rows = data.map(row => cols.map(col => `"${String(row[col.key] !== undefined ? row[col.key] : "").replace(/"/g, '""')}"`).join(','));
                return [headers, ...rows].join('\n');
            }
            const invCSV = arrayToCSV(snapshot.invoiceData, snapshot.invoiceColumns);
            const accCSV = arrayToCSV(snapshot.accountsData, snapshot.accountsColumns);
            const fibCSV = arrayToCSV(snapshot.fibData, snapshot.fibColumns);
            let fullCSV = `"Report Date: ${snapshot.date}"\n\n"INVOICE MASTER GRID"\n${invCSV}\n\n"ACCOUNTS SUMMARY"\n${accCSV}\n\n"FIB BALANCE"\n${fibCSV}\n`;
            const blob = new Blob([fullCSV], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute("download", `finance_report_${snapshot.date}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            logActivity(currentUser?.email, "Downloaded report as CSV", `Date: ${snapshot.date}`);
            alert("Report downloaded as CSV file.");
        }

        async function addColumnToTable(tableName, columnLabel) {
            if (!columnLabel || columnLabel.trim() === "") return false;
            const key = "col_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5);
            const newCol = { key: key, label: columnLabel.trim() };
            if (tableName === 'invoice') { invoiceColumns.push(newCol); invoiceData.forEach(row => row[key] = ""); }
            else if (tableName === 'accounts') { accountsColumns.push(newCol); accountsData.forEach(row => row[key] = ""); }
            else if (tableName === 'fib') { fibColumns.push(newCol); fibData.forEach(row => row[key] = ""); }
            await saveAllToStorage();
            await logActivity(currentUser?.email, `Added column to ${tableName}`, columnLabel);
            return true;
        }
        async function removeColumnFromTable(tableName, colKey) {
            let columns, data;
            if (tableName === 'invoice') { columns = invoiceColumns; data = invoiceData; }
            else if (tableName === 'accounts') { columns = accountsColumns; data = accountsData; }
            else { columns = fibColumns; data = fibData; }
            const idx = columns.findIndex(c => c.key === colKey);
            if (idx === -1) return false;
            columns.splice(idx, 1);
            data.forEach(row => delete row[colKey]);
            await saveAllToStorage();
            await logActivity(currentUser?.email, `Removed column from ${tableName}`, colKey);
            return true;
        }
        function renderDynamicTable(tbodyId, tableData, columns, isAdmin, tableName, perms) {
            const tbody = document.getElementById(tbodyId);
            if (!tbody) return;
            tbody.innerHTML = "";
            const canEdit = perms.edit;
            const canDeleteRow = perms.deleteRow;
            tableData.forEach((row, idx) => {
                const tr = document.createElement("tr");
                columns.forEach(col => {
                    const td = document.createElement("td");
                    const input = document.createElement("input");
                    input.type = "text";
                    input.className = "cell-input";
                    input.value = row[col.key] ?? "";
                    input.disabled = !(isAdmin || canEdit);
                    if (!input.disabled) {
                        input.addEventListener("input", async (e) => {
                            row[col.key] = e.target.value;
                            await saveDataToStorage();
                        });
                    }
                    td.appendChild(input);
                    tr.appendChild(td);
                });
                const actionTd = document.createElement("td");
                actionTd.className = "action-cell";
                const delBtn = document.createElement("button");
                delBtn.innerText = "🗑️";
                delBtn.className = "delete-btn";
                delBtn.disabled = !(isAdmin || canDeleteRow);
                if (!delBtn.disabled) {
                    delBtn.addEventListener("click", async () => {
                        if (tableData.length === 1) { alert("Cannot delete last row."); return; }
                        if (confirm(`Delete row #${idx+1}?`)) {
                            tableData.splice(idx, 1);
                            await saveDataToStorage();
                            renderDynamicTable(tbodyId, tableData, columns, isAdmin, tableName, perms);
                            await logActivity(currentUser?.email, `Deleted row in ${tableName}`, `Row ${idx}`);
                        }
                    });
                }
                actionTd.appendChild(delBtn);
                tr.appendChild(actionTd);
                tbody.appendChild(tr);
            });
        }

                await savePermissions();

        // --- Access Requests ---
        async function submitAccessRequest(email) {
            email = email.trim().toLowerCase();
            if (!email) {
                alert("Please enter an email address.");
                return false;
            }
            try {
                const viewers = await fbGet('viewers') || {};
                const alreadyExists = Object.values(viewers).some(e => e.toLowerCase() === email) || email === ADMIN_EMAIL.toLowerCase();
                if (alreadyExists) {
                    alert("This email already has access. Please sign in.");
                    return false;
                }
                const requests = await fbGet(PATHS.ACCESS_REQUESTS) || {};
                const alreadyRequested = Object.values(requests).some(r => r.email === email && r.status === 'pending');
                if (alreadyRequested) {
                    alert("A request for this email is already pending approval.");
                    return false;
                }
                await fbPush(PATHS.ACCESS_REQUESTS, { email, status: 'pending', timestamp: new Date().toISOString() });
                alert("✅ Access request submitted! Admin will review and approve.");
                return true;
            } catch (error) {
                console.error("Request error:", error);
                alert("Error submitting request: " + error.message);
                return false;
            }
        }

        async function getAccessRequests() {
            const reqs = await fbGet(PATHS.ACCESS_REQUESTS);
            if (!reqs) return [];
            return Object.entries(reqs).map(([key, val]) => ({ id: key, ...val })).filter(r => r.status === 'pending');
        }

        async function rejectRequest(requestId) {
            await fbUpdate(`${PATHS.ACCESS_REQUESTS}/${requestId}`, { status: 'rejected' });

                    pwdGroup.style.display = 'none';
                    forgotBtn.style.display = 'none';
                }
                errorDiv.textContent = '';
            }

            loginTab.onclick = () => setMode('login');
            requestTab.onclick = () => setMode('request');

            async function handleAction() {
                const email = emailInput.value.trim();
                if (!email) { errorDiv.textContent = 'Email required.'; return; }
                if (mode === 'login') {
                    const pwd = passwordInput.value;
                    if (!pwd) { errorDiv.textContent = 'Password required.'; return; }
                    try {
                        await signInWithEmailAndPassword(auth, email, pwd);
                    } catch (err) {
                        errorDiv.textContent = err.message;
                    }
                } else {
                    errorDiv.textContent = '';
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Submitting...';
                    const success = await submitAccessRequest(email);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Request Access';
                    if (success) {
                        emailInput.value = '';
                    }
                }
            }

            submitBtn.onclick = handleAction;
            forgotBtn.onclick = async () => {
                const email = emailInput.value.trim();
                if (!email) { errorDiv.textContent = 'Enter your email first.'; return; }
                try {
                    await sendPasswordResetEmail(auth, email);
                    alert('Password reset email sent!');
                } catch (err) {
                    errorDiv.textContent = err.message;
                }
            };
            [emailInput, passwordInput].forEach(i => i.addEventListener('keypress', (e) => { if(e.key==='Enter') handleAction(); }));
        }

        function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        async function bootstrap() {
            if (!firebaseReady) return;
            document.getElementById('appRoot').innerHTML = '<div class="loading-overlay"><div>Loading data from Firebase...</div></div>';
            onAuthStateChanged(auth, async (user) => {
                currentUser = user;
                if (user) {
                    const role = await getUserRole(user.uid);
                    const isAdminEmail = user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
                    
                    if (!isAdminEmail) {
                        const viewers = await fbGet('viewers') || {};
                        if (!role || role === 'revoked' || !viewers[user.uid]) {
                            alert('Your account has been removed by the administrator.');
                            await signOut(auth);
                            return;
                        }
                    }

                    const userRoleRef = ref(db, `${PATHS.USER_ROLES}/${user.uid}`);
                    const viewersRef = ref(db, `viewers/${user.uid}`);
                    
                    if (window._roleUnsubscribe) window._roleUnsubscribe();
                    if (window._viewerUnsubscribe) window._viewerUnsubscribe();
                    
                    window._roleUnsubscribe = onValue(userRoleRef, async (snapshot) => {
                        if (!snapshot.exists() || snapshot.val().role === 'revoked') {
                            alert('Your access has been revoked.');
                            await signOut(auth);
                        }
                    });
                    
                    if (!isAdminEmail) {
                        window._viewerUnsubscribe = onValue(viewersRef, async (snapshot) => {
                            if (!snapshot.exists()) {
                                alert('Your account has been removed.');
                                await signOut(auth);
                            }
                        });
                    }

                    await loadActivityLog();
                    await loadPermissions();
                    await loadColumnsAndData();
                    await loadSnapshots();
                    renderFullApp();
                } else {
                    if (window._roleUnsubscribe) window._roleUnsubscribe();
                    if (window._viewerUnsubscribe) window._viewerUnsubscribe();
                    renderAuthUI();
                }
            });
        }

        window.bootstrap = bootstrap;
        if (firebaseReady) bootstrap();
    })();
</script>
</body>
</html>
