<!-- Toast Container -->
<div id="toastContainer" class="fixed top-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

<script>
(function() {
    // ===== TOAST NOTIFICATION SYSTEM =====
    function showToast(message, type = 'info', duration = 3000) {
        const container = document.getElementById('toastContainer');
        if (!container) return;
        const colors = {
            success: 'bg-emerald-500', error: 'bg-red-500',
            warning: 'bg-amber-500', info: 'bg-brand-600'
        };
        const icons = {
            success: '✓', error: '✕', warning: '⚠', info: 'ℹ'
        };
        const toast = document.createElement('div');
        toast.className = `pointer-events-auto toast-enter ${colors[type] || colors.info} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-2 text-sm font-medium max-w-sm`;
        toast.innerHTML = `<span class="text-lg">${icons[type] || icons.info}</span><span>${escapeHtml(message)}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.classList.remove('toast-enter');
            toast.classList.add('toast-exit');
            setTimeout(() => toast.remove(), 300);
        }, duration);
    }

    // ===== CUSTOM MODAL SYSTEM (replaces native alert/confirm/prompt) =====
    function closeAllModals() {
        document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
    }

    function showModal({ title = '', message = '', type = 'info', inputs = [], confirmText = 'Confirm', cancelText = 'Cancel', danger = false }) {
        return new Promise((resolve) => {
            closeAllModals();
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[10000] p-4';

            const inputHTML = inputs.map((inp, i) => `
                <div class="mb-3">
                    ${inp.label ? `<label class="block text-xs font-medium text-surface-600 mb-1.5">${escapeHtml(inp.label)}</label>` : ''}
                    <input type="${inp.type || 'text'}" id="modal-input-${i}"
                        class="w-full px-4 py-3 rounded-xl border border-surface-200 text-sm focus:border-brand-400 focus:ring-2 focus:ring-brand-100 outline-none transition bg-white"
                        placeholder="${escapeHtml(inp.placeholder || '')}"
                        value="${escapeHtml(inp.value || '')}"
                        ${inp.type === 'password' ? 'autocomplete="new-password"' : ''}>
                </div>
            `).join('');

            const iconMap = { danger: '⚠️', warning: '⚠️', info: 'ℹ️', success: '✅' };
            const icon = danger ? iconMap.danger : (iconMap[type] || '');

            overlay.innerHTML = `
                <div class="modal-card-custom bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">
                    ${title ? `<div class="flex items-center gap-2.5 mb-2">${icon ? `<span class="text-xl">${icon}</span>` : ''}<h3 class="text-lg font-bold text-surface-800">${escapeHtml(title)}</h3></div>` : ''}
                    ${message ? `<p class="text-sm text-surface-600 mb-4 leading-relaxed">${escapeHtml(message)}</p>` : ''}
                    ${inputHTML}
                    <div class="flex gap-3 justify-end mt-5">
                        ${cancelText ? `<button class="modal-cancel-btn px-5 py-2.5 rounded-xl text-sm font-medium bg-surface-100 text-surface-600 hover:bg-surface-200 hover:text-surface-800 transition min-h-[44px]" id="modal-cancel">${escapeHtml(cancelText)}</button>` : ''}
                        <button class="modal-confirm-btn px-5 py-2.5 rounded-xl text-sm font-medium transition shadow-sm min-h-[44px] ${danger ? 'bg-red-600 text-white hover:bg-red-700 shadow-red-100' : 'bg-brand-600 text-white hover:bg-brand-700 shadow-brand-100'}" id="modal-confirm">${escapeHtml(confirmText)}</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            const firstInput = overlay.querySelector('input');
            if (firstInput) setTimeout(() => firstInput.focus(), 150);
            else setTimeout(() => overlay.querySelector('#modal-confirm')?.focus(), 100);

            const cleanup = (result) => {
                overlay.classList.add('closing');
                setTimeout(() => { overlay.remove(); resolve(result); }, 150);
            };

            overlay.querySelector('#modal-cancel')?.addEventListener('click', () => cleanup(inputs.length ? null : false));
            overlay.querySelector('#modal-confirm').addEventListener('click', () => {
                if (inputs.length) {
                    const values = inputs.map((_, i) => {
                        const el = overlay.querySelector(`#modal-input-${i}`);
                        return el ? el.value.trim() : '';
                    });
                    cleanup(values.length === 1 ? values[0] : values);
                } else cleanup(true);
            });
            overlay.addEventListener('click', (e) => { if (e.target === overlay) cleanup(inputs.length ? null : false); });
            overlay.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.target.matches('input[type="text"]')) { e.preventDefault(); overlay.querySelector('#modal-confirm').click(); }
                if (e.key === 'Enter' && e.target.matches('input')) { e.preventDefault(); overlay.querySelector('#modal-confirm').click(); }
                if (e.key === 'Escape') cleanup(inputs.length ? null : false);
            });
        });
    }

    async function customConfirm(message, title = 'Confirm', danger = false) {
        return showModal({ title, message, danger, confirmText: 'Yes, continue', cancelText: 'Cancel' });
    }

    async function customPrompt(label, placeholder = '', title = 'Input', type = 'text') {
        return showModal({ title, type: 'info', inputs: [{ label, placeholder, type }], confirmText: 'Submit', cancelText: 'Cancel' });
    }

    // ===== FIREBASE INIT =====
    let db, auth, ref, set, get, update, push, child, onValue, onAuthStateChanged,
        signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, sendPasswordResetEmail;

    async function waitForFirebase() {
        if (window.__firebaseReady) return;
        return new Promise((resolve, reject) => {
            const timeout = setTimeout(() => { cleanup(); reject(new Error('Firebase initialization timed out')); }, 10000);
            const cleanup = () => { clearTimeout(timeout); window.removeEventListener('firebase-ready', listener); clearInterval(interval); };
            const listener = () => { cleanup(); resolve(); };
            window.addEventListener('firebase-ready', listener, { once: true });
            const interval = setInterval(() => { if (window.__firebaseReady) { cleanup(); resolve(); } }, 50);
        });
    }

    async function initializeFirebase() {
        try {
            await waitForFirebase();
            db = window.db; auth = window.auth; ref = window.firebaseRef; set = window.firebaseSet; get = window.firebaseGet;
            update = window.firebaseUpdate; push = window.firebasePush; child = window.firebaseChild; onValue = window.firebaseOnValue;
            onAuthStateChanged = window.onAuthStateChanged; signInWithEmailAndPassword = window.signInWithEmailAndPassword;
            createUserWithEmailAndPassword = window.createUserWithEmailAndPassword; signOut = window.signOut;
            sendPasswordResetEmail = window.sendPasswordResetEmail;
        } catch (error) {
            document.getElementById('appRoot').innerHTML = `
                <div class="flex items-center justify-center min-h-screen">
                    <div class="bg-white rounded-2xl p-8 shadow-xl text-center max-w-md">
                        <div class="text-5xl mb-4">🔌</div>
                        <h2 class="text-xl font-bold text-surface-800 mb-2">Connection Error</h2>
                        <p class="text-surface-500 mb-4">Unable to connect to Firebase.</p>
                        <button class="bg-brand-600 text-white px-6 py-2.5 rounded-xl font-medium hover:bg-brand-700 transition" onclick="location.reload()">Retry</button>
                    </div>
                </div>`;
            throw error;
        }
    }

    function delegateEvent(parentSelector, eventType, selector, handler) {
        const parent = document.querySelector(parentSelector);
        if (!parent) return;
        parent.addEventListener(eventType, (e) => {
            const target = e.target.closest(selector);
            if (target) handler.call(target, e);
        });
    }

    // ===== GLOBAL STATE =====
    let invoiceColumns = [], accountsColumns = [], fibColumns = [];
    const DEFAULT_INVOICE_COLUMNS = [
        { key: "area", label: "Area" }, { key: "invoiceNo", label: "Invoice No" },
        { key: "submissionDate", label: "Submission Date" }, { key: "daysOutstand", label: "Days Outstand" },
        { key: "company", label: "Company" }, { key: "amount", label: "Amount (USD)" },
        { key: "exchangeRate", label: "Exchange Rate" }, { key: "bankStatus", label: "Bank Status" },
        { key: "topUpStatus", label: "Account Top-Up Status" }
    ];
    const DEFAULT_ACCOUNTS_COLUMNS = [
        { key: "account", label: "Accounts" }, { key: "invoiceNo", label: "Invoice No" },
        { key: "balance", label: "Balance we have" }, { key: "yesterdaySales", label: "yesterday sales" }
    ];
    const DEFAULT_FIB_COLUMNS = [
        { key: "invoiceNo", label: "FIB Balance (Invoice No)" }, { key: "amount", label: "Amount" },
        { key: "remaining", label: "Remaining Amount" }, { key: "status", label: "Status" }
    ];

    let invoiceData = [], accountsData = [], fibData = [];
    let viewerPermissions = {};
    let activityLog = []; const MAX_LOG_ENTRIES = 200;
    let snapshots = {};
    let currentUser = null, userRole = null;
    const ADMIN_EMAIL = "Rebaz.abdullah@Fast-pay.iq";

    function getBaghdadDate() {
        const d = new Date();
        return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Baghdad', year: 'numeric', month: '2-digit', day: '2-digit' }).format(d);
    }
    function formatBaghdadDateTime(iso) { return new Date(iso).toLocaleString('en-IQ', { timeZone: 'Asia/Baghdad' }); }
    function formatBaghdadDate(iso) { return new Date(iso).toLocaleDateString('en-IQ', { timeZone: 'Asia/Baghdad' }); }

    const PATHS = {
        USER_ROLES: 'userRoles', COLUMNS: 'columns', DATA: 'data',
        PERMISSIONS: 'permissions', ACTIVITY_LOG: 'activityLog',
        SNAPSHOTS: 'snapshots', ACCESS_REQUESTS: 'accessRequests'
    };

    async function fbGet(path) { try { const snap = await get(ref(db, path)); return snap.exists() ? snap.val() : null; } catch(e) { console.error('fbGet error:', e); return null; } }
    async function fbSet(path, data) { try { await set(ref(db, path), data); } catch(e) { console.error('fbSet error:', e); } }
    async function fbUpdate(path, data) { try { await update(ref(db, path), data); } catch(e) { console.error('fbUpdate error:', e); } }
    async function fbPush(path, data) { try { const nr = push(ref(db, path)); await set(nr, data); return nr.key; } catch(e) { console.error('fbPush error:', e); return null; } }

    async function loadColumnsAndData() {
        try {
            const cols = await fbGet(PATHS.COLUMNS) || {};
            invoiceColumns = cols.invoice || [...DEFAULT_INVOICE_COLUMNS];
            accountsColumns = cols.accounts || [...DEFAULT_ACCOUNTS_COLUMNS];
            fibColumns = cols.fib || [...DEFAULT_FIB_COLUMNS];
            const data = await fbGet(PATHS.DATA) || {};
            invoiceData = data.invoice || []; accountsData = data.accounts || []; fibData = data.fib || [];

            if (!invoiceData.length) invoiceData = [
                { area:"Erbil To Baghdad", invoiceNo:"12888407", submissionDate:"29-Mar-26", daysOutstand:"8", company:"Mintroute", amount:"IQD 1,450,000,000", exchangeRate:"", bankStatus:"N/A", topUpStatus:"Not Received" },
                { area:"Baghdad To Mintroute", invoiceNo:"2166", submissionDate:"23-Mar-26", daysOutstand:"14", company:"Mintroute", amount:"$ 1,052,705.00", exchangeRate:"IQD 1,320", bankStatus:"Final Approval", topUpStatus:"Not Received" }
            ].map(r => { let nr = {}; invoiceColumns.forEach(c => nr[c.key] = r[c.key] || ""); return nr; });

            if (!accountsData.length) accountsData = [
                { account:"LikeCard", invoiceNo:"INV-1001", balance:"$ 32,040.43", yesterdaySales:"$ 483.26" },
                { account:"Mintroute", invoiceNo:"INV-1002", balance:"$ 832,474.70", yesterdaySales:"$ 65,772.75" },
                { account:"OneCard", invoiceNo:"INV-1003", balance:"$ 100,000.00", yesterdaySales:"$ -" },
                { account:"FIB:Mintroute", invoiceNo:"INV-1004", balance:"$ 814,388.37", yesterdaySales:"$ 55,033.17" }
            ].map(r => { let nr = {}; accountsColumns.forEach(c => nr[c.key] = r[c.key] || ""); return nr; });

            if (!fibData.length) fibData = [
                { invoiceNo:"T14", amount:"$1,000,000.00", remaining:"$500,000.00", status:"Remaining" },
                { invoiceNo:"T15", amount:"$1,000,000.00", remaining:"$1,000,000.00", status:"Pending To Pay" }
            ].map(r => { let nr = {}; fibColumns.forEach(c => nr[c.key] = r[c.key] || ""); return nr; });

            await saveAllToStorage();
        } catch(e) { console.error(e); }
    }

    async function saveColumnsToStorage() { await fbUpdate(PATHS.COLUMNS, { invoice: invoiceColumns, accounts: accountsColumns, fib: fibColumns }); }
    async function saveDataToStorage() { await fbUpdate(PATHS.DATA, { invoice: invoiceData, accounts: accountsData, fib: fibData }); }
    async function saveAllToStorage() { await saveColumnsToStorage(); await saveDataToStorage(); }
    async function getUserRole(uid) { const snap = await fbGet(`${PATHS.USER_ROLES}/${uid}`); return snap ? snap.role : null; }
    async function setUserRole(uid, role) { await fbSet(`${PATHS.USER_ROLES}/${uid}`, { role, email: currentUser?.email || '' }); }

    function getDefaultTablePerms() {
        return { view: true, edit: false, addRow: false, deleteRow: false, addColumn: false, deleteColumn: false, dragRows: false, dragColumns: false, print: false, share: false };
    }
    function getDefaultViewerPermissions() {
        return { invoice: getDefaultTablePerms(), accounts: getDefaultTablePerms(), fib: getDefaultTablePerms() };
    }

    async function loadPermissions() {
        const perms = await fbGet(PATHS.PERMISSIONS) || {};
        viewerPermissions = perms;
        Object.keys(viewerPermissions).forEach(uid => {
            ['invoice','accounts','fib'].forEach(t => {
                if (viewerPermissions[uid][t]) {
                    if (viewerPermissions[uid][t].dragRows === undefined) viewerPermissions[uid][t].dragRows = false;
                    if (viewerPermissions[uid][t].dragColumns === undefined) viewerPermissions[uid][t].dragColumns = false;
                    if (viewerPermissions[uid][t].print === undefined) viewerPermissions[uid][t].print = false;
                    if (viewerPermissions[uid][t].share === undefined) viewerPermissions[uid][t].share = false;
                }
            });
        });
        await savePermissions();
    }
    async function savePermissions() { await fbSet(PATHS.PERMISSIONS, viewerPermissions); }

    function ensureViewerPermissions(uid) {
        if (!viewerPermissions[uid]) {
            viewerPermissions[uid] = getDefaultViewerPermissions();
            savePermissions();
        } else {
            const p = viewerPermissions[uid];
            if (!p.invoice) p.invoice = getDefaultTablePerms();
            if (!p.accounts) p.accounts = getDefaultTablePerms();
            if (!p.fib) p.fib = getDefaultTablePerms();

                    if (p[t].dragRows === undefined) p[t].dragRows = false;
                    if (p[t].dragColumns === undefined) p[t].dragColumns = false;
                }
            });
            savePermissions();
        }
    }

        if (!str) return 0;
        const m = str.toString().match(/[\d,]+\.?\d*/);
        return m ? parseFloat(m[0].replace(/,/g, '')) : 0;
    }

    function downloadReportAsCSV() {
        const sel = document.getElementById("reportDateSelect");
        const date = sel?.value;
        let snap = (date && snapshots[date]) ? snapshots[date] : { invoiceColumns, accountsColumns, fibColumns, invoiceData, accountsData, fibData, date: getBaghdadDate() };
        function toCSV(data, cols) {
            if (!data.length) return "";
            const h = cols.map(c => `"${c.label.replace(/"/g, '""')}"`).join(',');
            const rows = data.map(r => cols.map(c => `"${String(r[c.key]||'').replace(/"/g, '""')}"`).join(','));
            return [h, ...rows].join('\n');
        }
        const csv = `"Report Date: ${snap.date}"\n\nINVOICE\n${toCSV(snap.invoiceData, snap.invoiceColumns)}\n\nACCOUNTS\n${toCSV(snap.accountsData, snap.accountsColumns)}\n\nFIB\n${toCSV(snap.fibData, snap.fibColumns)}`;
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `finance_report_${snap.date}.csv`;
        a.click();
        URL.revokeObjectURL(a.href);
        logActivity(currentUser?.email, "Downloaded CSV", snap.date);
        showToast("Report downloaded", "success");
    }

    async function addColumnToTable(tableName, label) {
        if (!label?.trim()) return false;
        const key = "col_" + Date.now() + "_" + Math.random().toString(36).substr(2,5);
        const col = { key, label: label.trim() };
        if (tableName === 'invoice') { invoiceColumns.push(col); invoiceData.forEach(r => r[key] = ""); }
        else if (tableName === 'accounts') { accountsColumns.push(col); accountsData.forEach(r => r[key] = ""); }
        else { fibColumns.push(col); fibData.forEach(r => r[key] = ""); }
        await saveAllToStorage();
        await logActivity(currentUser?.email, `Added column to ${tableName}`, label);
        return true;
    }

    async function removeColumnFromTable(tableName, key) {
        let cols, data;
        if (tableName === 'invoice') { cols = invoiceColumns; data = invoiceData; }
        else if (tableName === 'accounts') { cols = accountsColumns; data = accountsData; }
        else { cols = fibColumns; data = fibData; }
        const idx = cols.findIndex(c => c.key === key);
        if (idx === -1) return false;
        cols.splice(idx, 1);
        data.forEach(r => delete r[key]);
        await saveAllToStorage();
        await logActivity(currentUser?.email, `Removed column from ${tableName}`, key);
        return true;
    }

    // ===== DRAGGABLE TABLE =====
    function initDraggableTable(tableId, dataArr, colsArr, tableName, canDragRows, canDragColumns) {
        const tbl = document.getElementById(tableId);
        if (!tbl) return;
        const tbody = tbl.querySelector('tbody'), thead = tbl.querySelector('thead tr');
        if (!tbody || !thead) return;
        if (tbody._sortable) tbody._sortable.destroy();
        if (thead._sortable) thead._sortable.destroy();

        if (canDragRows) {
            tbody._sortable = new Sortable(tbody, {
                animation: 150, handle: '.drag-handle', draggable: 'tr',
                ghostClass: 'sortable-ghost', chosenClass: 'sortable-chosen',
                delay: 100, delayOnTouchOnly: true,
                onEnd: async (evt) => {
                    if (evt.oldIndex === evt.newIndex) return;
                    const moved = dataArr.splice(evt.oldIndex, 1)[0];
                    dataArr.splice(evt.newIndex, 0, moved);
                    await saveDataToStorage();
                    await logActivity(currentUser?.email, `Reordered rows in ${tableName}`, `${evt.oldIndex} → ${evt.newIndex}`);
                }
            });
        }
        if (canDragColumns) {
            thead._sortable = new Sortable(thead, {
                animation: 150, draggable: 'th.draggable-column',
                delay: 100, delayOnTouchOnly: true,
                onEnd: async (evt) => {
                    const oldIndex = evt.oldDraggableIndex, newIndex = evt.newDraggableIndex;
                    if (oldIndex === newIndex) return;
                    const moved = colsArr.splice(oldIndex, 1)[0];
                    colsArr.splice(newIndex, 0, moved);
                    const keys = colsArr.map(c => c.key);
                    dataArr.forEach(r => {
                        const nr = {}; keys.forEach(k => nr[k] = r[k] || '');
                        Object.keys(r).forEach(k => delete r[k]); Object.assign(r, nr);
                    });
                    await saveAllToStorage();
                    await logActivity(currentUser?.email, `Reordered columns in ${tableName}`, `${oldIndex} → ${newIndex}`);
                    renderFullApp();
                }
            });
        }
    }

    // ===== RENDER DYNAMIC TABLE =====
    function renderDynamicTable(tbodyId, data, cols, isAdmin, tableName, perms) {
        const tbody = document.getElementById(tbodyId);
        if (!tbody) return;
        tbody.innerHTML = "";
        const canEdit = perms.edit, canDel = perms.deleteRow, canDrag = perms.dragRows || false;

        data.forEach((row, idx) => {
            const tr = document.createElement("tr");
            tr.className = "data-row border-b border-surface-100 hover:bg-surface-50/50 transition";

            // Drag handle cell
            const tdHandle = document.createElement("td");
            tdHandle.className = "w-[36px] text-center shrink-0";
            if (canDrag) {
                tdHandle.innerHTML = `<span class="drag-handle text-surface-400 text-lg inline-block px-1" title="Drag to reorder">☰</span>`;
            }
            tr.appendChild(tdHandle);

            // Data cells
            cols.forEach(col => {
                const td = document.createElement("td");
                td.className = "px-1 py-1.5";
                const inp = document.createElement("input");
                inp.type = "text";
                inp.className = "cell-input w-full border border-surface-200 rounded-lg px-3 py-3 text-sm bg-white disabled:bg-surface-50 disabled:text-surface-600 disabled:cursor-default";
                inp.value = row[col.key] ?? "";
                inp.disabled = !(isAdmin || canEdit);
                const adjustFontSize = (el) => {
                    const len = el.value.length;
                    if (len > 40) el.style.fontSize = '10px';
                    else if (len > 25) el.style.fontSize = '11px';
                    else if (len > 15) el.style.fontSize = '12px';
                    else if (len > 8) el.style.fontSize = '13px';
                    else el.style.fontSize = '';
                };
                adjustFontSize(inp);
                if (!inp.disabled) {
                    inp.addEventListener("input", async (e) => {
                        row[col.key] = e.target.value;
                        adjustFontSize(e.target);
                        await saveDataToStorage();
                    });
                }
                td.appendChild(inp);
                tr.appendChild(td);
            });

            // Action cell
            const tdAct = document.createElement("td");
            tdAct.className = "action-cell text-center w-[60px] px-1";
            const delBtn = document.createElement("button");
            delBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>`;
            delBtn.className = "delete-btn p-1.5 rounded-lg text-surface-400 hover:text-red-500 hover:bg-red-50 disabled:opacity-30 disabled:cursor-not-allowed transition";
            delBtn.disabled = !(isAdmin || canDel);
            delBtn.title = "Delete row";
            if (!delBtn.disabled) {
                delBtn.addEventListener("click", async () => {
                    if (data.length === 1) { showToast("Cannot delete the last row.", "warning"); return; }
                    if (confirm(`Delete row #${idx+1}?`)) {
                        data.splice(idx, 1);
                        await saveDataToStorage();
                        renderFullApp();
                        await logActivity(currentUser?.email, `Deleted row in ${tableName}`, `Row ${idx}`);
                        showToast(`Row deleted from ${tableName}`, "info");
                    }
                });
            }
            tdAct.appendChild(delBtn);
            tr.appendChild(tdAct);
            tbody.appendChild(tr);
        });
    }

    async function submitAccessRequest(email) {
        email = email.trim().toLowerCase();
        if (!email) { showToast("Enter an email address", "warning"); return false; }
        try {
            const viewers = await fbGet('viewers') || {};
            if (Object.values(viewers).some(e => e.toLowerCase() === email) || email === ADMIN_EMAIL.toLowerCase()) {
                showToast("Email already has access.", "warning"); return false;
            }
            const reqs = await fbGet(PATHS.ACCESS_REQUESTS) || {};
            if (Object.values(reqs).some(r => r.email === email && r.status === 'pending')) {
                showToast("Request already pending.", "warning"); return false;
            }
            await fbPush(PATHS.ACCESS_REQUESTS, { email, status: 'pending', timestamp: new Date().toISOString() });
            showToast("✅ Request submitted successfully!", "success");
            return true;
        } catch(e) { showToast(e.message, "error"); return false; }
    }

    async function getAccessRequests() {
        const reqs = await fbGet(PATHS.ACCESS_REQUESTS);
        if (!reqs) return [];
        return Object.entries(reqs).map(([id, v]) => ({ id, ...v })).filter(r => r.status === 'pending');
    }

    async function rejectRequest(id) { await fbUpdate(`${PATHS.ACCESS_REQUESTS}/${id}`, { status: 'rejected' }); }

    // ===== PDF GENERATION (permission-aware, mode: 'print' or 'share') =====
    async function generateFinancePDF(mode = 'print') {
        const isAdmin = userRole === 'admin';
        let viewerPerms = null;
        if (!isAdmin && currentUser) {
            ensureViewerPermissions(currentUser.uid);
            viewerPerms = viewerPermissions[currentUser.uid];
        }
        const getEffectivePerms = (tablePerms) => {
            if (isAdmin) return { view: true, edit: true, addRow: true, deleteRow: true, addColumn: true, deleteColumn: true, dragRows: true, dragColumns: true, print: true, share: true };
            return tablePerms || getDefaultTablePerms();
        };
        const invP = getEffectivePerms(viewerPerms?.invoice);
        const accP = getEffectivePerms(viewerPerms?.accounts);
        const fibP = getEffectivePerms(viewerPerms?.fib);

        // Check if user has ANY permission for this mode
        const permKey = mode;
        const hasAnyTablePerm = invP[permKey] || accP[permKey] || fibP[permKey];
        if (!hasAnyTablePerm && !isAdmin) {
            showToast(`No ${mode} permission for any table. Contact admin.`, 'error', 4000);
            return null;
        }

        const buildTable = (data, cols, title, accent) => {
            if (!data.length) return '';
            return `
            <div style="margin-bottom:28px">
                <h2 style="font-size:15px;font-weight:700;color:${accent};margin:0 0 8px;border-bottom:2px solid ${accent};padding-bottom:4px">${title}</h2>
                <table style="width:100%;border-collapse:collapse;font-size:9px">
                    <thead><tr style="background:#f1f5f9">${cols.map(c => `<th style="padding:5px 7px;text-align:left;border:1px solid #cbd5e1;font-weight:600;color:#334155;white-space:nowrap">${escapeHtml(c.label)}</th>`).join('')}</tr></thead>
                    <tbody>${data.map(r => `<tr>${cols.map(c => `<td style="padding:4px 7px;border:1px solid #e2e8f0;color:#475569">${escapeHtml(r[c.key] || '')}</td>`).join('')}</tr>`).join('')}</tbody>
                </table>
            </div>`;
        };

        const today = getBaghdadDate();
        const modeLabel = mode === 'print' ? 'Print Copy' : 'Shared Copy';
        let html = `<div style="font-family:Arial,Helvetica,sans-serif;padding:20px;max-width:1100px;margin:0 auto;color:#1e293b">
            <div style="text-align:center;margin-bottom:20px;border-bottom:3px solid #3373ff;padding-bottom:12px">
                <h1 style="font-size:22px;font-weight:800;color:#1e293b;margin:0">📊 Finance Vault Report</h1>
                <p style="font-size:11px;color:#64748b;margin:4px 0 0">Generated: ${today} · Baghdad Time · ${modeLabel}</p>
            </div>`;

        // Only include tables where user has BOTH view AND the mode permission (print/share)
        if (invP.view && invP[permKey]) html += buildTable(invoiceData, invoiceColumns, 'Invoice Master Grid', '#1a53f5');
        if (accP.view && accP[permKey]) html += buildTable(accountsData, accountsColumns, 'Accounts Summary', '#059669');
        if (fibP.view && fibP[permKey]) html += buildTable(fibData, fibColumns, 'FIB Balance', '#7c3aed');

        // Check if any table was actually included
        const hasContent = html.indexOf('margin-bottom:28px') !== -1;
        if (!hasContent) {
            html += `<div style="text-align:center;padding:40px;color:#94a3b8">
                <p style="font-size:14px;margin:0 0 6px">No tables available for ${mode}.</p>
                <p style="font-size:11px;margin:0">Contact your administrator for access.</p>
            </div>`;
        }

        html += `</div>`;

        const wrapper = document.createElement('div');
        wrapper.innerHTML = html;
        document.body.appendChild(wrapper);

        const filename = `Finance_Vault_${today}_${mode}.pdf`;

        try {
            const pdf = await html2pdf().from(wrapper).set({
                margin: [8, 8, 8, 8],
                filename,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, logging: false },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            }).toPdf().get('pdf');

            const pdfBlob = pdf.output('blob');
            document.body.removeChild(wrapper);
            return { blob: pdfBlob, filename };
        } catch (e) {
            console.error('PDF generation error:', e);
            try { document.body.removeChild(wrapper); } catch(_) {}
            throw e;
        }
    }

    // ===== MAIN RENDER =====
    async function renderFullApp() {
        const root = document.getElementById("appRoot");
        if (!root) return;
        if (!currentUser) { renderAuthUI(); return; }

        userRole = await getUserRole(currentUser.uid);
        if (!userRole) {
            if (currentUser.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) { await setUserRole(currentUser.uid, 'admin'); userRole = 'admin'; }
            else { userRole = 'viewer'; await setUserRole(currentUser.uid, 'viewer'); ensureViewerPermissions(currentUser.uid); }
        } else if (currentUser.email.toLowerCase() === ADMIN_EMAIL.toLowerCase() && userRole !== 'admin') {
            await setUserRole(currentUser.uid, 'admin'); userRole = 'admin';
        }

        const isAdmin = userRole === 'admin', isViewer = userRole === 'viewer';
        let viewerPerms = null;
        if (isViewer) { ensureViewerPermissions(currentUser.uid); viewerPerms = viewerPermissions[currentUser.uid]; }

        const getEffectivePerms = (tablePerms) => {
            if (isAdmin) return { view: true, edit: true, addRow: true, deleteRow: true, addColumn: true, deleteColumn: true, dragRows: true, dragColumns: true, print: true, share: true };
            return tablePerms || getDefaultTablePerms();
        };

        const invP = getEffectivePerms(viewerPerms?.invoice), accP = getEffectivePerms(viewerPerms?.accounts), fibP = getEffectivePerms(viewerPerms?.fib);

        const renderTableActionBtns = (table, perms) => {

                showToast("Row added to Invoice", "success");
            });
            delegateEvent('.app-container', 'click', '#add_invoice_col', async () => {
                const n = await customPrompt('Column Name', 'Enter new column name', 'Add Column to Invoice');
                if (n) { await addColumnToTable('invoice', n); renderFullApp(); }
            });
            delegateEvent('.app-container', 'click', '#reset_invoice_btn', async () => {
                if (await customConfirm("Reset Invoice table to defaults? This will clear all data and cannot be undone.", "Reset Invoice Table", true)) {
                    invoiceColumns = JSON.parse(JSON.stringify(DEFAULT_INVOICE_COLUMNS)); invoiceData = [];
                    await saveAllToStorage(); await loadColumnsAndData(); renderFullApp();
                    await logActivity(currentUser.email, "Reset Invoice"); showToast("Invoice table reset", "info");
                }
            });
            delegateEvent('.app-container', 'click', '#add_accounts_row', async () => {
                const nr = {}; accountsColumns.forEach(c => nr[c.key] = ""); accountsData.push(nr);
                await saveDataToStorage(); refresh(); await logActivity(currentUser.email, "Added accounts row");
                showToast("Row added to Accounts", "success");
            });
            delegateEvent('.app-container', 'click', '#add_accounts_col', async () => {
                const n = await customPrompt('Column Name', 'Enter new column name', 'Add Column to Accounts');
                if (n) { await addColumnToTable('accounts', n); renderFullApp(); }
            });
            delegateEvent('.app-container', 'click', '#reset_accounts_btn', async () => {
                if (await customConfirm("Reset Accounts table to defaults? This will clear all data and cannot be undone.", "Reset Accounts Table", true)) {
                    accountsColumns = JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS_COLUMNS)); accountsData = [];
                    await saveAllToStorage(); await loadColumnsAndData(); renderFullApp();
                    await logActivity(currentUser.email, "Reset Accounts"); showToast("Accounts table reset", "info");
                }
            });
            delegateEvent('.app-container', 'click', '#add_fib_row', async () => {
                const nr = {}; fibColumns.forEach(c => nr[c.key] = ""); fibData.push(nr);
                await saveDataToStorage(); refresh(); await logActivity(currentUser.email, "Added FIB row");
                showToast("Row added to FIB", "success");
            });
            delegateEvent('.app-container', 'click', '#add_fib_col', async () => {
                const n = await customPrompt('Column Name', 'Enter new column name', 'Add Column to FIB');
                if (n) { await addColumnToTable('fib', n); renderFullApp(); }
            });
            delegateEvent('.app-container', 'click', '#reset_fib_btn', async () => {
                if (await customConfirm("Reset FIB table to defaults? This will clear all data and cannot be undone.", "Reset FIB Table", true)) {
                    fibColumns = JSON.parse(JSON.stringify(DEFAULT_FIB_COLUMNS)); fibData = [];
                    await saveAllToStorage(); await loadColumnsAndData(); renderFullApp();
                    await logActivity(currentUser.email, "Reset FIB"); showToast("FIB table reset", "info");
                }
            });

            // Viewer management
            const viewers = await listViewers();
            const vContainer = document.getElementById("viewerListContainer");
            if (vContainer) {
                vContainer.innerHTML = '';
                for (let uid of viewers) {
                    const email = (await fbGet(`viewers/${uid}`)) || 'unknown';
                    vContainer.innerHTML += `
                        <div class="inline-flex items-center gap-2 bg-white rounded-full px-3 py-1.5 text-xs border border-surface-200 shadow-sm">
                            <span class="font-medium text-surface-700">${escapeHtml(email)}</span>
                            <button class="remove-colleague text-red-400 hover:text-red-600 font-bold transition" data-uid="${uid}" data-email="${escapeHtml(email)}">✖</button>
                        </div>`;
                }
            }
            delegateEvent('.app-container', 'click', '.remove-colleague', async function() {
                const uid = this.dataset.uid, email = this.dataset.email;
                if (await customConfirm(`Remove ${email} from viewers? They will lose all access.`, "Remove Viewer", true)) { await removeViewer(uid, email); renderFullApp(); }
            });
            delegateEvent('.app-container', 'click', '#addViewerBtn', async () => {
                const email = document.getElementById("newViewerEmail")?.value.trim();
                const pwd = document.getElementById("newViewerPassword")?.value;
                if (email && pwd) {
                    if (await addViewer(email, pwd)) {
                        document.getElementById("newViewerEmail").value = '';
                        document.getElementById("newViewerPassword").value = '';
                        renderFullApp();
                    }
                } else showToast("Enter email and password", "warning");
            });

            // Permission matrix
            const permBody = document.getElementById("permTableBody");
            if (permBody) {
                permBody.innerHTML = '';
                const tables = ['invoice','accounts','fib'];
                for (let uid of viewers) {
                    const email = (await fbGet(`viewers/${uid}`)) || uid;
                    ensureViewerPermissions(uid);
                    const perms = viewerPermissions[uid];
                    let isFirstRow = true;
                    for (let tbl of tables) {
                        const p = perms[tbl] || getDefaultTablePerms();
                        const row = permBody.insertRow();
                        row.className = "hover:bg-surface-50 transition";
                        // Fix: Insert email cell first (index 0), then table name at correct index
                        if (isFirstRow) {
                            const emailCell = row.insertCell(0);
                            emailCell.innerHTML = `<strong class="text-surface-800">${escapeHtml(email)}</strong>`;
                            emailCell.className = "px-3 py-2 border border-surface-200";
                            emailCell.rowSpan = tables.length;
                        }
                        const tblIdx = isFirstRow ? 1 : 0;
                        const tblCell = row.insertCell(tblIdx);
                        tblCell.className = "px-3 py-2 border border-surface-200 font-medium text-surface-600";
                        tblCell.textContent = tbl.charAt(0).toUpperCase() + tbl.slice(1);
                        const addCheck = (act, chk) => {
                            const cell = row.insertCell();
                            cell.className = "px-3 py-2 border border-surface-200 text-center";
                            const cb = document.createElement("input");
                            cb.type = "checkbox"; cb.checked = chk; cb.className = "perm-checkbox";
                            cb.addEventListener("change", e => updateTablePermission(uid, tbl, act, e.target.checked));
                            cell.appendChild(cb);
                        };
                        addCheck('view', p.view); addCheck('edit', p.edit);
                        addCheck('addRow', p.addRow); addCheck('deleteRow', p.deleteRow);
                        addCheck('addColumn', p.addColumn); addCheck('deleteColumn', p.deleteColumn);
                        addCheck('dragRows', p.dragRows||false); addCheck('dragColumns', p.dragColumns||false); addCheck('print', p.print||false); addCheck('share', p.share||false);
                        isFirstRow = false;
                    }
                }
            }

            // Reports
            populateReportDateSelect();
            delegateEvent('.app-container', 'click', '#saveSnapshotBtn', () => saveCurrentSnapshot());
            delegateEvent('.app-container', 'click', '#generateReportBtn', () => {
                const d = document.getElementById("reportDateSelect").value;
                if (d) generateReportForDate(d); else showToast("Select a date first", "warning");
            });
            delegateEvent('.app-container', 'click', '#downloadCsvBtn', downloadReportAsCSV);

            // Activity log
            renderActivityLog();
            delegateEvent('.app-container', 'click', '#clearLogBtn', clearActivityLog);
        }

        // Global buttons
        delegateEvent('.app-container', 'click', '#logoutBtn', async () => {
            await logActivity(currentUser.email, "Logged out");
            await signOut(auth);
        });
        delegateEvent('.app-container', 'click', '#printBtn', async () => {
            showToast('Generating PDF for print...', 'info', 2000);
            try {
                const result = await generateFinancePDF('print');
                if (!result) return; // No permission
                const { blob, filename } = result;
                const blobUrl = URL.createObjectURL(blob);
                window.open(blobUrl, '_blank');
                await logActivity(currentUser.email, "Printed PDF report");
                showToast('PDF opened — use Ctrl+P to print', 'success', 4000);
            } catch (e) {
                console.error('Print failed:', e);
                showToast('Print failed, trying fallback...', 'warning');
                window.print();
                await logActivity(currentUser.email, "Printed (fallback)");
            }
        });
        delegateEvent('.app-container', 'click', '#shareBtn', async () => {
            showToast('Generating PDF report...', 'info', 2000);
            try {
                const result = await generateFinancePDF('share');
                if (!result) return; // No permission
                const { blob, filename } = result;
                const file = new File([blob], filename, { type: 'application/pdf' });

                // Try native share with file attachment (mobile)
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({
                            title: 'Finance Vault Report',
                            text: 'Finance Vault — Financial Data Report (PDF)',
                            files: [file]
                        });
                        await logActivity(currentUser.email, "Shared PDF via Web Share API");
                        showToast('PDF shared successfully!', 'success');
                        return;
                    } catch (e) {
                        if (e.name === 'AbortError') return; // User cancelled
                    }
                }

                // Fallback: download the PDF file (desktop)
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                await logActivity(currentUser.email, "Downloaded PDF report (share)");
                showToast('PDF downloaded for sharing!', 'success');
            } catch (e) {
                console.error('Share PDF failed:', e);
                showToast('Failed to generate PDF for sharing', 'error');
            }
        });
    }

    // ===== AUTH UI =====
    function renderAuthUI() {
        const root = document.getElementById("appRoot");
        root.innerHTML = `
        <div class="flex items-center justify-center min-h-screen p-4 sm:p-6 bg-gradient-to-br from-brand-50 via-white to-purple-50">
            <div class="w-full max-w-md fade-in-up">
                <!-- Logo / Branding -->
                <div class="text-center mb-6 sm:mb-8">
                    <div class="w-14 h-14 sm:w-16 sm:h-16 rounded-2xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center text-white font-bold text-xl sm:text-2xl shadow-xl shadow-brand-200 mx-auto mb-3 sm:mb-4">FV</div>
                    <h1 class="text-xl sm:text-2xl font-bold text-surface-900">Finance Vault</h1>
                    <p class="text-surface-500 text-xs sm:text-sm mt-1">Secure financial data management</p>
                </div>

                <!-- Auth Card -->
                <div class="bg-white rounded-2xl shadow-xl shadow-surface-200/50 border border-surface-200/60 p-5 sm:p-6">
                    <div class="flex gap-1 mb-5 sm:mb-6 bg-surface-100 rounded-xl p-1">
                        <button class="tab-btn-auth flex-1 py-2 sm:py-2.5 rounded-lg text-xs sm:text-sm font-medium transition active min-h-[44px]" id="loginTab">Sign In</button>
                        <button class="tab-btn-auth flex-1 py-2 sm:py-2.5 rounded-lg text-xs sm:text-sm font-medium transition text-surface-500 min-h-[44px]" id="requestTab">Request Access</button>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-medium text-surface-600 mb-1.5 block">Email</label>
                            <input type="email" id="authEmail" placeholder="you@company.com" class="w-full px-4 py-3 rounded-xl border border-surface-200 text-base sm:text-sm focus:border-brand-400 focus:ring-2 focus:ring-brand-100 outline-none transition">
                        </div>
                        <div id="pwdGroup">
                            <label class="text-xs font-medium text-surface-600 mb-1.5 block">Password</label>
                            <input type="password" id="authPassword" placeholder="Enter your password" class="w-full px-4 py-3 rounded-xl border border-surface-200 text-base sm:text-sm focus:border-brand-400 focus:ring-2 focus:ring-brand-100 outline-none transition">
                        </div>
                        <div id="authError" class="text-red-500 text-xs hidden"></div>
                        <button class="w-full bg-brand-600 text-white py-3 rounded-xl text-sm font-semibold hover:bg-brand-700 active:scale-[0.98] transition shadow-md shadow-brand-200 min-h-[48px]" id="authSubmitBtn">Sign In</button>
                        <button class="w-full text-surface-400 text-xs hover:text-brand-600 transition py-2 min-h-[44px]" id="forgotPwdBtn">Forgot Password?</button>
                    </div>
                </div>

                <p class="text-center text-xs text-surface-400 mt-6">Baghdad Time Zone · Firebase Powered</p>
            </div>
        </div>`;

        let mode = 'login';
        const loginTab = document.getElementById('loginTab'), reqTab = document.getElementById('requestTab');
        const submit = document.getElementById('authSubmitBtn'), emailInp = document.getElementById('authEmail');
        const pwdInp = document.getElementById('authPassword'), pwdGrp = document.getElementById('pwdGroup');
        const forgot = document.getElementById('forgotPwdBtn'), err = document.getElementById('authError');

        function setMode(m) {
            mode = m;
            loginTab.classList.toggle('active', m === 'login'); loginTab.classList.toggle('text-surface-500', m !== 'login');
            reqTab.classList.toggle('active', m === 'request'); reqTab.classList.toggle('text-surface-500', m !== 'request');
            submit.textContent = m === 'login' ? 'Sign In' : 'Request Access';
            pwdGrp.style.display = m === 'login' ? 'block' : 'none';
            forgot.style.display = m === 'login' ? 'block' : 'none';
            err.classList.add('hidden');
        }
        loginTab.onclick = () => setMode('login');
        reqTab.onclick = () => setMode('request');

        function showError(msg) { err.textContent = msg; err.classList.remove('hidden'); }

        async function handle() {
            const email = emailInp.value.trim();
            if (!email) { showError('Email is required.'); return; }
            if (mode === 'login') {
                const pwd = pwdInp.value;
                if (!pwd) { showError('Password is required.'); return; }
                try {
                    await signInWithEmailAndPassword(auth, email, pwd);
                } catch(e) { showError(e.message); }
            } else {
                submit.disabled = true; submit.textContent = 'Submitting...';
                const ok = await submitAccessRequest(email);
                submit.disabled = false; submit.textContent = 'Request Access';
                if (ok) emailInp.value = '';
            }
        }
        submit.onclick = handle;
        forgot.onclick = async () => {
            const email = emailInp.value.trim();
            if (!email) { showError('Enter your email first.'); return; }
            try { await sendPasswordResetEmail(auth, email); showToast('Password reset email sent!', 'success'); }
            catch(e) { showError(e.message); }
        };
        [emailInp, pwdInp].forEach(i => i.addEventListener('keypress', e => { if (e.key === 'Enter') handle(); }));
    }

    // ===== UTILITY =====
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }

    // ===== BOOTSTRAP =====
    async function bootstrap() {
        try {
            await initializeFirebase();
            document.getElementById('appRoot').innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-screen gap-3">
                    <div class="spinner"></div>
                    <p class="text-surface-500 text-sm font-medium">Loading Finance Vault...</p>
                </div>`;

            onAuthStateChanged(auth, async (user) => {
                currentUser = user;
                closeAllModals(); // Close any open modals on auth change
                if (user) {
                    const role = await getUserRole(user.uid);
                    const isAdminEmail = user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
                    if (!isAdminEmail) {
                        const viewers = await fbGet('viewers') || {};
                        if (!role || role === 'revoked' || !viewers[user.uid]) {
                            showToast('Account has been removed.', 'error');
                            await signOut(auth); return;
                        }
                    }
                    const roleRef = ref(db, `${PATHS.USER_ROLES}/${user.uid}`), viewersRef = ref(db, `viewers/${user.uid}`);
                    if (window._roleUnsub) window._roleUnsub();
                    if (window._viewerUnsub) window._viewerUnsub();
                    window._roleUnsub = onValue(roleRef, async (snap) => {
                        if (!snap.exists() || snap.val().role === 'revoked') { showToast('Access has been revoked.', 'error'); await signOut(auth); }
                    });
                    if (!isAdminEmail) window._viewerUnsub = onValue(viewersRef, async (snap) => {
                        if (!snap.exists()) { showToast('Account has been removed.', 'error'); await signOut(auth); }
                    });

                    await loadActivityLog(); await loadPermissions(); await loadColumnsAndData(); await loadSnapshots();
                    renderFullApp();
                } else {
                    if (window._roleUnsub) window._roleUnsub();
                    if (window._viewerUnsub) window._viewerUnsub();
                    renderAuthUI();
                }
            });
        } catch (error) { console.error('Bootstrap failed:', error); }
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', () => bootstrap());
    else bootstrap();
})();
</script>
