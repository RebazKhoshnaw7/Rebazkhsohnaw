<div id="appRoot">Loading Firebase...</div>
<script>
    (function() {
        let db, auth, ref, set, get, update, push, child, onValue, onAuthStateChanged,
            signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, sendPasswordResetEmail;
        let firebaseReady = false;

        window.addEventListener('firebase-ready', () => {
            db = window.db; auth = window.auth; ref = window.firebaseRef; set = window.firebaseSet; get = window.firebaseGet;
            update = window.firebaseUpdate; push = window.firebasePush; child = window.firebaseChild; onValue = window.firebaseOnValue;
            onAuthStateChanged = window.onAuthStateChanged; signInWithEmailAndPassword = window.signInWithEmailAndPassword;
            createUserWithEmailAndPassword = window.createUserWithEmailAndPassword; signOut = window.signOut;
            sendPasswordResetEmail = window.sendPasswordResetEmail; firebaseReady = true; bootstrap();
        });

        // -------------------- GLOBAL VARIABLES --------------------
        let invoiceColumns = [], accountsColumns = [], fibColumns = [];
        const DEFAULT_INVOICE_COLUMNS = [
            { key: "area", label: "Area" }, { key: "invoiceNo", label: "Invoice No" }, { key: "submissionDate", label: "Submission Date" },
            { key: "daysOutstand", label: "Days Outstand" }, { key: "company", label: "Company" }, { key: "amount", label: "Amount (USD)" },
            { key: "exchangeRate", label: "Exchange Rate" }, { key: "bankStatus", label: "Bank Status" }, { key: "topUpStatus", label: "Account Top-Up Status" }
        ];
        const DEFAULT_ACCOUNTS_COLUMNS = [
            { key: "account", label: "Accounts" }, { key: "invoiceNo", label: "Invoice No" },
            { key: "balance", label: "Balance we have" }, { key: "yesterdaySales", label: "yesterday sales" }
        ];
        const DEFAULT_FIB_COLUMNS = [
            { key: "invoiceNo", label: "FIB Balance (Invoice No)" }, { key: "amount", label: "Amount" },
            { key: "remaining", label: "Remaining Amount" }, { key: "status", label: "Status" }
        ];

        let invoiceData = [], accountsData = [], fibData = [];
        let viewerPermissions = {};
        let activityLog = [];
        const MAX_LOG_ENTRIES = 200;
        let snapshots = {};
        let currentUser = null;
        let userRole = null;
        const ADMIN_EMAIL = "Rebaz.abdullah@Fast-pay.iq";

        function getBaghdadDate() { const d = new Date(); return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Baghdad', year: 'numeric', month: '2-digit', day: '2-digit' }).format(d); }
        function formatBaghdadDateTime(iso) { return new Date(iso).toLocaleString('en-IQ', { timeZone: 'Asia/Baghdad' }); }
        function formatBaghdadDate(iso) { return new Date(iso).toLocaleDateString('en-IQ', { timeZone: 'Asia/Baghdad' }); }

        const PATHS = {
            USER_ROLES: 'userRoles', COLUMNS: 'columns', DATA: 'data', PERMISSIONS: 'permissions',
            ACTIVITY_LOG: 'activityLog', SNAPSHOTS: 'snapshots', ACCESS_REQUESTS: 'accessRequests'
        };

        async function fbGet(path) { const snap = await get(ref(db, path)); return snap.exists() ? snap.val() : null; }
        async function fbSet(path, data) { await set(ref(db, path), data); }
        async function fbUpdate(path, data) { await update(ref(db, path), data); }
        async function fbPush(path, data) { const nr = push(ref(db, path)); await set(nr, data); return nr.key; }

        async function loadColumnsAndData() {
            try {
                const cols = await fbGet(PATHS.COLUMNS) || {};
                invoiceColumns = cols.invoice || [...DEFAULT_INVOICE_COLUMNS];
                accountsColumns = cols.accounts || [...DEFAULT_ACCOUNTS_COLUMNS];
                fibColumns = cols.fib || [...DEFAULT_FIB_COLUMNS];
                const data = await fbGet(PATHS.DATA) || {};
                invoiceData = data.invoice || []; accountsData = data.accounts || []; fibData = data.fib || [];
                if (!invoiceData.length) invoiceData = [ { area:"Erbil To Baghdad",invoiceNo:"12888407",submissionDate:"29-Mar-26",daysOutstand:"8",company:"Mintroute",amount:"IQD 1,450,000,000",exchangeRate:"",bankStatus:"N/A",topUpStatus:"Not Received" }, { area:"Baghdad To Mintroute",invoiceNo:"2166",submissionDate:"23-Mar-26",daysOutstand:"14",company:"Mintroute",amount:"$ 1,052,705.00",exchangeRate:"IQD 1,320",bankStatus:"Final Approval",topUpStatus:"Not Received" } ].map(r=>{ let nr={}; invoiceColumns.forEach(c=>nr[c.key]=r[c.key]||""); return nr; });
                if (!accountsData.length) accountsData = [ { account:"LikeCard",invoiceNo:"INV-1001",balance:"$ 32,040.43",yesterdaySales:"$ 483.26" }, { account:"Mintroute",invoiceNo:"INV-1002",balance:"$ 832,474.70",yesterdaySales:"$ 65,772.75" }, { account:"OneCard",invoiceNo:"INV-1003",balance:"$ 100,000.00",yesterdaySales:"$ -" }, { account:"FIB:Mintroute",invoiceNo:"INV-1004",balance:"$ 814,388.37",yesterdaySales:"$ 55,033.17" } ].map(r=>{ let nr={}; accountsColumns.forEach(c=>nr[c.key]=r[c.key]||""); return nr; });
                if (!fibData.length) fibData = [ { invoiceNo:"T14",amount:"$1,000,000.00",remaining:"$500,000.00",status:"Remaining" }, { invoiceNo:"T15",amount:"$1,000,000.00",remaining:"$1,000,000.00",status:"Pending To Pay" } ].map(r=>{ let nr={}; fibColumns.forEach(c=>nr[c.key]=r[c.key]||""); return nr; });
                await saveAllToStorage();
            } catch(e) { console.error(e); }
        }
        async function saveColumnsToStorage() { await fbUpdate(PATHS.COLUMNS, { invoice: invoiceColumns, accounts: accountsColumns, fib: fibColumns }); }
        async function saveDataToStorage() { await fbUpdate(PATHS.DATA, { invoice: invoiceData, accounts: accountsData, fib: fibData }); }
        async function saveAllToStorage() { await saveColumnsToStorage(); await saveDataToStorage(); }

        async function getUserRole(uid) { const snap = await get(ref(db, `${PATHS.USER_ROLES}/${uid}`)); return snap.exists() ? snap.val().role : null; }
        async function setUserRole(uid, role) { await set(ref(db, `${PATHS.USER_ROLES}/${uid}`), { role, email: currentUser?.email || '' }); }

        function getDefaultTablePerms() { return { view: true, edit: false, addRow: false, deleteRow: false, addColumn: false, deleteColumn: false, dragRows: false, dragColumns: false }; }
        function getDefaultViewerPermissions() { return { invoice: getDefaultTablePerms(), accounts: getDefaultTablePerms(), fib: getDefaultTablePerms() }; }

        async function loadPermissions() { const perms = await fbGet(PATHS.PERMISSIONS) || {}; viewerPermissions = perms; Object.keys(viewerPermissions).forEach(uid => { ['invoice','accounts','fib'].forEach(t => { if (viewerPermissions[uid][t]) { if (viewerPermissions[uid][t].dragRows === undefined) viewerPermissions[uid][t].dragRows = false; if (viewerPermissions[uid][t].dragColumns === undefined) viewerPermissions[uid][t].dragColumns = false; } }); }); await savePermissions(); }
        async function savePermissions() { await fbSet(PATHS.PERMISSIONS, viewerPermissions); }
        function ensureViewerPermissions(uid) { if (!viewerPermissions[uid]) { viewerPermissions[uid] = getDefaultViewerPermissions(); savePermissions(); } else { const p = viewerPermissions[uid]; if (!p.invoice) p.invoice = getDefaultTablePerms(); if (!p.accounts) p.accounts = getDefaultTablePerms(); if (!p.fib) p.fib = getDefaultTablePerms(); ['invoice','accounts','fib'].forEach(t => { if (p[t]) { if (p[t].dragRows === undefined) p[t].dragRows = false; if (p[t].dragColumns === undefined) p[t].dragColumns = false; } }); savePermissions(); } }

        async function updateTablePermission(uid, table, action, value) {
            if (!viewerPermissions[uid]) viewerPermissions[uid] = getDefaultViewerPermissions();
            if (!viewerPermissions[uid][table]) viewerPermissions[uid][table] = getDefaultTablePerms();
            viewerPermissions[uid][table][action] = value; await savePermissions();
            await logActivity(currentUser?.email || 'system', "Changed permission", `${uid} - ${table}.${action}=${value}`);
            renderFullApp();
        }

        async function loadActivityLog() { const log = await fbGet(PATHS.ACTIVITY_LOG); activityLog = log ? (Array.isArray(log) ? log : Object.values(log)) : []; }
        async function saveActivityLog() { if (activityLog.length > MAX_LOG_ENTRIES) activityLog = activityLog.slice(-MAX_LOG_ENTRIES); await fbSet(PATHS.ACTIVITY_LOG, activityLog); }
        async function logActivity(userEmail, action, details = "") { activityLog.push({ timestamp: new Date().toISOString(), userEmail, action, details }); await saveActivityLog(); if (document.getElementById("activityLogContainer")) renderActivityLog(); }
        function renderActivityLog() { const c = document.getElementById("activityLogContainer"); if (!c) return; if (!activityLog.length) { c.innerHTML = '<div class="log-entry">No activity recorded.</div>'; return; } const rev = [...activityLog].reverse(); c.innerHTML = rev.map(e => `<div class="log-entry"><span class="log-time">${formatBaghdadDateTime(e.timestamp)}</span><span class="log-user">${escapeHtml(e.userEmail)}</span><span class="log-action"><strong>${escapeHtml(e.action)}</strong> ${escapeHtml(e.details)}</span></div>`).join(''); }
        async function clearActivityLog() { if (confirm("Clear all logs?")) { activityLog = []; await saveActivityLog(); renderActivityLog(); await logActivity(currentUser?.email, "Cleared activity log"); } }

        async function loadSnapshots() { const s = await fbGet(PATHS.SNAPSHOTS); snapshots = s || {}; }
        async function saveSnapshots() { await fbSet(PATHS.SNAPSHOTS, snapshots); }
        async function saveCurrentSnapshot(date = null) { const today = date || getBaghdadDate(); snapshots[today] = { date: today, timestamp: new Date().toISOString(), invoiceColumns: JSON.parse(JSON.stringify(invoiceColumns)), accountsColumns: JSON.parse(JSON.stringify(accountsColumns)), fibColumns: JSON.parse(JSON.stringify(fibColumns)), invoiceData: JSON.parse(JSON.stringify(invoiceData)), accountsData: JSON.parse(JSON.stringify(accountsData)), fibData: JSON.parse(JSON.stringify(fibData)) }; await saveSnapshots(); await logActivity(currentUser?.email, "Saved daily snapshot", today); alert(`Snapshot saved for ${today}`); if (document.getElementById("reportDateSelect")) populateReportDateSelect(); }
        function populateReportDateSelect() { const sel = document.getElementById("reportDateSelect"); if (!sel) return; const dates = Object.keys(snapshots).sort().reverse(); sel.innerHTML = '<option value="">-- Select a date --</option>'; dates.forEach(d => { const opt = document.createElement("option"); opt.value = d; opt.textContent = d; sel.appendChild(opt); }); }
        function extractNumericAmount(str) { if (!str) return 0; const m = str.toString().match(/[\d,]+\.?\d*/); return m ? parseFloat(m[0].replace(/,/g, '')) : 0; }
        function generateReportForDate(date) {
            const s = snapshots[date]; if (!s) { alert("No snapshot for this date."); return; }
            const div = document.getElementById("reportContent"); if (!div) return;
            let usd = 0, iqd = 0; s.invoiceData.forEach(r => { const amt = r.amount || ""; if (amt.includes("$")) usd += extractNumericAmount(amt); else if (amt.includes("IQD")) iqd += extractNumericAmount(amt); });
            let bal = 0; s.accountsData.forEach(r => bal += extractNumericAmount(r.balance));
            let amt = 0, rem = 0; s.fibData.forEach(r => { amt += extractNumericAmount(r.amount); rem += extractNumericAmount(r.remaining); });
            const renderTbl = (data, cols) => `<table class="editable-table"><thead><tr>${cols.map(c => `<th>${escapeHtml(c.label)}</th>`).join('')}</tr></thead><tbody>${data.map(r => `<tr>${cols.map(c => `<td>${escapeHtml(r[c.key] || '')}</td>`).join('')}</tr>`).join('')}</tbody></table>`;

        async function removeColumnFromTable(tableName, key) {

            else if (tableName === 'accounts') { cols = accountsColumns; data = accountsData; }

        // ---------- FIXED DRAG & DROP (SMOOTH COLUMN REORDER) ----------
        function initDraggableTable(tableId, dataArr, colsArr, tableName, canDragRows, canDragColumns) {
            const tbl = document.getElementById(tableId); if (!tbl) return;
            const tbody = tbl.querySelector('tbody'), thead = tbl.querySelector('thead tr');
            if (!tbody || !thead) return;
            if (tbody._sortable) tbody._sortable.destroy();
            if (thead._sortable) thead._sortable.destroy();

            if (canDragRows) {
                tbody._sortable = new Sortable(tbody, { animation: 150, handle: '.drag-handle', draggable: 'tr', ghostClass: 'sortable-ghost', onEnd: async (evt) => {
                    if (evt.oldIndex === evt.newIndex) return;
                    const moved = dataArr.splice(evt.oldIndex, 1)[0]; dataArr.splice(evt.newIndex, 0, moved);
                    await saveDataToStorage(); await logActivity(currentUser?.email, `Reordered rows in ${tableName}`, `${evt.oldIndex} → ${evt.newIndex}`);
                }});
            }

            if (canDragColumns) {
                thead._sortable = new Sortable(thead, { animation: 150, draggable: 'th.draggable-column', onEnd: async (evt) => {
                    if (evt.oldIndex === evt.newIndex) return;
                    // Reorder columns array
                    const moved = colsArr.splice(evt.oldIndex, 1)[0];
                    colsArr.splice(evt.newIndex, 0, moved);
                    // Reorder data rows' keys
                    const keys = colsArr.map(c => c.key);
                    dataArr.forEach(r => { const nr = {}; keys.forEach(k => nr[k] = r[k] || ''); Object.keys(r).forEach(k => delete r[k]); Object.assign(r, nr); });
                    await saveAllToStorage();
                    await logActivity(currentUser?.email, `Reordered columns in ${tableName}`, `${evt.oldIndex} → ${evt.newIndex}`);
                    // Smoothly update the DOM without full re-render
                    const rows = Array.from(tbody.querySelectorAll('tr'));
                    rows.forEach((tr, ri) => {
                        const rowData = dataArr[ri];
                        const cells = Array.from(tr.children);
                        // Skip first cell (drag handle) and last cell (action)
                        for (let ci = 0; ci < colsArr.length; ci++) {
                            const col = colsArr[ci];
                            const input = cells[ci + 1]?.querySelector('input');
                            if (input) input.value = rowData[col.key] ?? '';
                        }
                    });
                    // Update header labels (and remove buttons)
                    const headerCells = Array.from(thead.children).filter(th => !th.classList.contains('action-header') && th.cellIndex !== 0);
                    colsArr.forEach((col, idx) => {
                        if (headerCells[idx]) {
                            const btn = headerCells[idx].querySelector('.remove-col-btn');
                            headerCells[idx].innerHTML = `${escapeHtml(col.label)}${btn ? btn.outerHTML : ''}`;
                        }
                    });
                }});
            }
        }

        function renderDynamicTable(tbodyId, data, cols, isAdmin, tableName, perms) {
            const tbody = document.getElementById(tbodyId); if (!tbody) return; tbody.innerHTML = "";

            data.forEach((row, idx) => {
                const tr = document.createElement("tr");

                if (canDrag) { tdHandle.className = "drag-handle"; tdHandle.innerHTML = "☰"; tdHandle.title = "Drag to reorder"; }

        function renderAuthUI() {
            const root = document.getElementById("appRoot");
            root.innerHTML = `<div class="modal"><div class="modal-card"><div class="tab-container"><button class="tab-btn active" id="loginTab">Sign In</button><button class="tab-btn" id="requestTab">Request Access</button></div><div><div class="input-group"><input type="email" id="authEmail" placeholder="Email"></div><div class="input-group" id="pwdGroup"><input type="password" id="authPassword" placeholder="Password"></div><div id="authError" class="error-message"></div><div><button class="btn btn-primary" id="authSubmitBtn">Sign In</button><button class="btn btn-warning" id="forgotPwdBtn">Forgot Password?</button></div></div></div></div>`;
            let mode = 'login'; const loginTab = document.getElementById('loginTab'), reqTab = document.getElementById('requestTab'), submit = document.getElementById('authSubmitBtn'), emailInp = document.getElementById('authEmail'), pwdInp = document.getElementById('authPassword'), pwdGrp = document.getElementById('pwdGroup'), forgot = document.getElementById('forgotPwdBtn'), err = document.getElementById('authError');
            function setMode(m) { mode = m; loginTab.classList.toggle('active', m==='login'); reqTab.classList.toggle('active', m==='request'); submit.textContent = m==='login' ? 'Sign In' : 'Request Access'; pwdGrp.style.display = m==='login' ? 'block' : 'none'; forgot.style.display = m==='login' ? 'inline-block' : 'none'; err.textContent = ''; }
            loginTab.onclick = ()=>setMode('login'); reqTab.onclick = ()=>setMode('request');
            async function handle() { const email = emailInp.value.trim(); if (!email) { err.textContent = 'Email required.'; return; } if (mode==='login') { const pwd = pwdInp.value; if (!pwd) { err.textContent = 'Password required.'; return; } try { await signInWithEmailAndPassword(auth, email, pwd); } catch(e) { err.textContent = e.message; } } else { submit.disabled = true; submit.textContent = 'Submitting...'; const ok = await submitAccessRequest(email); submit.disabled = false; submit.textContent = 'Request Access'; if (ok) emailInp.value = ''; } }
            submit.onclick = handle; forgot.onclick = async () => { const email = emailInp.value.trim(); if (!email) { err.textContent = 'Enter email first.'; return; } try { await sendPasswordResetEmail(auth, email); alert('Reset email sent!'); } catch(e) { err.textContent = e.message; } };
            [emailInp, pwdInp].forEach(i => i.addEventListener('keypress', e => { if(e.key==='Enter') handle(); }));
        }

        function escapeHtml(s) { return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        async function bootstrap() {
            if (!firebaseReady) return; document.getElementById('appRoot').innerHTML = '<div class="loading-overlay">Loading...</div>';
            onAuthStateChanged(auth, async (user) => {
                currentUser = user; if (user) { const role = await getUserRole(user.uid); const isAdminEmail = user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase(); if (!isAdminEmail) { const viewers = await fbGet('viewers') || {}; if (!role || role==='revoked' || !viewers[user.uid]) { alert('Account removed.'); await signOut(auth); return; } }
                    const roleRef = ref(db, `${PATHS.USER_ROLES}/${user.uid}`), viewersRef = ref(db, `viewers/${user.uid}`); if (window._roleUnsub) window._roleUnsub(); if (window._viewerUnsub) window._viewerUnsub();
                    window._roleUnsub = onValue(roleRef, async (snap) => { if (!snap.exists() || snap.val().role==='revoked') { alert('Access revoked.'); await signOut(auth); } });
                    if (!isAdminEmail) window._viewerUnsub = onValue(viewersRef, async (snap) => { if (!snap.exists()) { alert('Account removed.'); await signOut(auth); } });
                    await loadActivityLog(); await loadPermissions(); await loadColumnsAndData(); await loadSnapshots(); renderFullApp();
                } else { if (window._roleUnsub) window._roleUnsub(); if (window._viewerUnsub) window._viewerUnsub(); renderAuthUI(); }
            });
        }

        window.bootstrap = bootstrap; if (firebaseReady) bootstrap();
    })();
</script>
</body>
